spring.application.name=backend

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nagai}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

spring.flyway.baseline-on-migrate=true

# ─── Actuator (separate port — not exposed to the internet) ───
management.server.port=${MANAGEMENT_PORT:9091}
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskSpace.enabled=true
management.info.env.enabled=true
info.app.name=NagAI Backend
info.app.version=@project.version@

security.jwt.secret-key=${JWT_SECRET:891c0c365e1f5f8bebe33f7abdcf23f0ba0cc0be6cadf1c284e955cb9ae4d9fa}
# 7 days in milliseconds
security.jwt.expiration-time=604800000

# Google OAuth — replace with your actual Client ID from Google Cloud Console
google.client-id=${GOOGLE_CLIENT_ID:917359475939-flt440bk36997401sm0c6si4bie4c7bg.apps.googleusercontent.com}

# Gmail SMTP — use a Gmail App Password (not your normal password)
# To generate: Google Account → Security → 2-Step Verification → App Passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER:emmanuel.dev.pierre@gmail.com}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Base URL used in verification email links
app.base-url=${APP_BASE_URL:http://localhost:3000}

# CORS — comma-separated allowed origins
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# gRPC client — Python AI service
spring.grpc.client.channels.ai-service.address=static://${GRPC_AI_HOST:localhost}:${GRPC_AI_PORT:9090}
spring.grpc.client.channels.ai-service.negotiation-type=PLAINTEXT

# Kafka producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer