syntax = "proto3";

package nagai.ai;

option java_package = "com.nagai.ai";
option java_outer_classname = "AiServiceProto";
option java_multiple_files = true;

service AiService {
  rpc SuggestSmartField      (SmartFieldRequest)       returns (SmartFieldResponse);
  rpc GenerateChecklistItem  (ChecklistItemRequest)    returns (ChecklistItemResponse);
  rpc GenerateFullChecklist  (FullChecklistRequest)    returns (FullChecklistResponse);
  rpc GenerateDailyChecklist (DailyChecklistRequest)   returns (DailyChecklistResponse);
  rpc AgentChat              (AgentChatRequest)        returns (AgentChatResponse);
}

// --- SuggestSmartField ---

message SmartFieldRequest {
  string field            = 1;  // specific|measurable|attainable|relevant|timely
  string goal_title       = 2;
  string goal_description = 3;
  map<string, string> existing_fields = 4;  // already-filled SMART fields for coherent suggestions
  string user_profile     = 5;  // user's career/interests/hobbies/habits for personalization
  string steps_taken      = 6;  // free-form text describing progress already made toward the goal
  string target_date      = 7;  // user's target completion date (ISO format, e.g. 2026-09-01)
}

message SmartFieldResponse {
  string suggestion = 1;
}

// --- GenerateChecklistItem ---

message ChecklistItemRequest {
  string          goal_title        = 1;
  string          goal_description  = 2;
  repeated string existing_items    = 3;  // active (incomplete) item titles
  string          user_profile      = 4;
  repeated string completed_items   = 5;  // titles of already-completed items
  string          goal_smart_context = 6; // SMART field breakdown as formatted string
}

message ChecklistItemResponse {
  string title    = 1;
  string notes    = 2;
  string deadline = 3;
}

// --- GenerateFullChecklist ---

message FullChecklistRequest {
  string          goal_title         = 1;
  string          goal_description   = 2;
  string          user_profile       = 3;
  repeated string completed_items    = 4;  // titles of already-completed items
  string          goal_smart_context = 5;  // SMART field breakdown as formatted string
}

message ChecklistItem {
  string title    = 1;
  string notes    = 2;
  string deadline = 3;
}

message FullChecklistResponse {
  repeated ChecklistItem items = 1;
}

// --- GenerateDailyChecklist ---

message DailyChecklistCandidate {
  string label              = 1;  // "[G5-23]" — encodes goalId-checklistId
  string title              = 2;
  string notes              = 3;
  bool   completed          = 4;
  string goal_title         = 5;
  string goal_smart_context = 6;  // SMART field breakdown for richer context
}

message DailyChecklistRequest {
  repeated DailyChecklistCandidate candidates = 1;  // goal checklist items as labeled candidates
  repeated string recurring_items             = 2;  // user-defined recurring anchors
  int32  max_items                            = 3;
  string current_time                         = 4;  // "14:30" in user's timezone
  string user_profile                         = 5;
  string day_of_week                          = 6;  // "Monday"
  string plan_date                            = 7;  // "2026-03-23"
}

message DailyChecklistItemSuggestion {
  string label          = 1;  // "[G5-23]" (verbatim link), "[G5]" (goal tag), "[R]" (recurring), "[NEW]" (connective)
  string title          = 2;
  string notes          = 3;
  string scheduled_time = 4;  // "09:00"
}

message DailyChecklistResponse {
  repeated DailyChecklistItemSuggestion items = 1;
}

// --- AgentChat ---

message ChatHistoryEntry {
  string role    = 1;  // "user" or "assistant"
  string content = 2;
}

message ChatGoalSummary {
  string title                   = 1;
  string description             = 2;
  string smart_context           = 3;
  int32  completed_items         = 4;
  int32  total_items             = 5;
  repeated string active_items   = 6;
}

message AgentChatRequest {
  string user_message                    = 1;
  string user_profile                    = 2;
  repeated ChatGoalSummary goals         = 3;
  repeated ChatHistoryEntry history      = 4;
  string from_context_summary            = 5;  // optional: last nag context when linked from email
}

message AgentChatResponse {
  string assistant_message = 1;
}
