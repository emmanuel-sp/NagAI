syntax = "proto3";

package nagai.ai;

option java_package = "com.nagai.ai";
option java_outer_classname = "AiServiceProto";
option java_multiple_files = true;

service AiService {
  rpc SuggestSmartField     (SmartFieldRequest)    returns (SmartFieldResponse);
  rpc GenerateChecklistItem (ChecklistItemRequest) returns (ChecklistItemResponse);
  rpc GenerateFullChecklist (FullChecklistRequest) returns (FullChecklistResponse);
}

// --- SuggestSmartField ---

message SmartFieldRequest {
  string field            = 1;  // specific|measurable|attainable|relevant|timely
  string goal_title       = 2;
  string goal_description = 3;
  map<string, string> existing_fields = 4;  // already-filled SMART fields for coherent suggestions
  string user_profile     = 5;  // user's career/interests/hobbies/habits for personalization
  string steps_taken      = 6;  // free-form text describing progress already made toward the goal
  string target_date      = 7;  // user's target completion date (ISO format, e.g. 2026-09-01)
}

message SmartFieldResponse {
  string suggestion = 1;
}

// --- GenerateChecklistItem ---

message ChecklistItemRequest {
  string          goal_title        = 1;
  string          goal_description  = 2;
  repeated string existing_items    = 3;  // active (incomplete) item titles
  string          user_profile      = 4;
  repeated string completed_items   = 5;  // titles of already-completed items
  string          goal_smart_context = 6; // SMART field breakdown as formatted string
}

message ChecklistItemResponse {
  string title    = 1;
  string notes    = 2;
  string deadline = 3;
}

// --- GenerateFullChecklist ---

message FullChecklistRequest {
  string          goal_title         = 1;
  string          goal_description   = 2;
  string          user_profile       = 3;
  repeated string completed_items    = 4;  // titles of already-completed items
  string          goal_smart_context = 5;  // SMART field breakdown as formatted string
}

message ChecklistItem {
  string title    = 1;
  string notes    = 2;
  string deadline = 3;
}

message FullChecklistResponse {
  repeated ChecklistItem items = 1;
}
