services:
  postgres:
    image: postgres:16-alpine
    container_name: nagai-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nagai-redis
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nagai-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GRPC_AI_HOST: ai-service
      GRPC_AI_PORT: 9090
      REDIS_HOST: redis
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: nagai-ai-service
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      GRPC_PORT: 9090
      REDIS_HOST: redis
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      BACKEND_INTERNAL_URL: http://backend:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: nagai-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
